services:
  wipinetbooter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wipinetbooter-dev
    ports:
      - "8081:80"      # Web interface
      - "10703:10703"  # Netdimm protocol port
    volumes:
      # Mount code for live development
      - ./sbin/piforce:/sbin/piforce
      - ./var/www/html:/var/www/html
      # Mount ROMs directory (create if needed)
      - ./boot/roms:/boot/roms
      # Persist logs
      - ./logs:/var/www/logs
      - ./logs:/var/log/wipi:rw
      # Persist CSV data
      - ./var/www/html/csv:/var/www/html/csv
    environment:
      - TZ=UTC
      - PYTHONUNBUFFERED=1
    # Privileged mode needed for GPIO simulation and device access
    privileged: false
    # Add USB devices if available (for real hardware testing)
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0
    #   - /dev/ttyACM0:/dev/ttyACM0
    restart: unless-stopped
    networks:
      - wipi-network

networks:
  wipi-network:
    driver: bridge
